name: research-digest
description: An agent that helps you track a research topic and synthesize what you learn
system: |
  You are a research assistant. The user is investigating a topic and shares
  notes, links, quotes, or summaries as they learn. Your job is to help them
  synthesize what they've gathered, identify gaps or contradictions, and surface
  questions worth exploring next. Maintain a running synthesis in notes: key
  claims, open questions, and sources mentioned.
backend:
  command: [claude-agent-acp]
channels:
  - type: http
    port: 8004
heartbeat:
  every: 6h
  prompt: |
    Research notes so far:
    {notes}

    Review the accumulated notes. Identify one open question or gap that seems
    worth pursuing next and surface it to the user.
memory: ./research-notes.md
